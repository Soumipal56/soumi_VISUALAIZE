name: Retroactive GSSOC Assigner

# This workflow can be manually triggered to process existing issues
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, only log what would be done without making changes'
        required: true
        default: 'true'

permissions:
  issues: write

jobs:
  retro-assign:
    runs-on: ubuntu-latest
    steps:
      - name: Process Existing Issues
        uses: actions/github-script@v7
        with:
          script: |
            const dryRun = context.payload.inputs.dry_run === 'true';
            console.log(`Running Retroactive Assigner (Dry Run: ${dryRun})`);

            // 1. Fetch all open issues
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            for (const issue of issues) {
              if (issue.pull_request) continue; // Skip PRs

              // 2. Check if already assigned
              if (issue.assignees && issue.assignees.length > 0) continue;

              // 3. Verify labels (gssoc and approved)
              const labels = issue.labels.map(l => l.name.toLowerCase());
              const isGssoc = labels.includes('gssoc') || labels.includes('gssoc2026');
              const isApproved = labels.includes('approved');

              if (!isGssoc || !isApproved) continue;

              // 4. Find the first valid /assign comment
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number
              });

              const assignComment = comments.find(c => c.body.trim().toLowerCase() === '/assign');

              if (assignComment) {
                const commenter = assignComment.user.login;
                const issueBody = issue.body ? issue.body.trim() : "";

                // 5. Check quality gate (100 chars)
                if (issueBody.length < 100) {
                   console.log(`Issue #${issue.number} has /assign but body is too short. Skipping.`);
                   continue;
                }

                console.log(`Matching Issue #${issue.number}: Assigning to @${commenter}`);

                if (!dryRun) {
                  // Assign user
                  await github.rest.issues.addAssignees({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    assignees: [commenter]
                  });

                  // Post welcome message
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    body: `🎉 Retroactively assigned to @${commenter}!\n\nWelcome to **VISUALAIZE**! Since you previously requested assignment, we've processed your request. Happy coding! 💻✨`
                  });
                }
              }
            }
