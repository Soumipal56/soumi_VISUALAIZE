name: Retroactive GSSOC Assigner

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, only log what would be done without making changes'
        required: true
        default: 'false'

permissions:
  issues: write

jobs:
  retro-assign:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Process Existing Issues
        uses: actions/github-script@v9
        with:
          script: |
            const dryRun = context.payload.inputs.dry_run === 'true';
            console.log(`Running Retroactive Assigner (Dry Run: ${dryRun})`);

            // 1. Fetch all open issues
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            for (const issue of issues) {
              if (issue.pull_request) continue; // Skip PRs

              // 2. Check if already assigned
              if (issue.assignees && issue.assignees.length > 0) {
                console.log(`Issue #${issue.number} is already assigned. Skipping.`);
                continue;
              }

              // 3. Fetch comments for this issue
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number
              });

              // 4. Find the first comment expressing intent to be assigned
              const assignComment = comments.find(c => {
                const body = c.body.toLowerCase();
                return body.includes('assign') || body.includes('i want to work') || body.includes('can i take');
              });

              if (assignComment) {
                const commenter = assignComment.user.login;
                console.log(`Found intent on Issue #${issue.number} from @${commenter}: "${assignComment.body}"`);

                if (!dryRun) {
                  console.log(`Executing assignment & labeling for Issue #${issue.number} to @${commenter}`);
                  
                  // Auto-label (Admin Mode)
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    labels: ['gssoc', 'gssoc2026', 'assigned']
                  });

                  // Assign user
                  await github.rest.issues.addAssignees({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    assignees: [commenter]
                  });

                  // Post welcome message
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    body: `🎉 Retroactively assigned to @${commenter}!\n\nWelcome to **VISUALAIZE**! I've also tagged this issue with **GSSOC 2026** labels for your tracking. Happy coding! 💻✨`
                  });
                } else {
                  console.log(`[DRY RUN] Would assign and label Issue #${issue.number} to @${commenter}`);
                }
              }
            }
