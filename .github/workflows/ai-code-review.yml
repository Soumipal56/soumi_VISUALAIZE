name: AI Code Reviewer

on:
  pull_request:
    types: [opened, synchronize]
    branches: ["master"]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Diff
        id: get_diff
        run: |
          git diff origin/master...HEAD > pr_diff.txt
          echo "diff_path=pr_diff.txt" >> $GITHUB_OUTPUT

      - name: Gemini AI Review
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('pr_diff.txt', 'utf8');
            
            if (diff.length > 30000) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: "🔍 **AI Review Skip**: The PR diff is too large for a deep scan. Please keep PRs small and focused for better code review quality!"
              });
              return;
            }

            const prompt = `
            You are an expert Senior Software Engineer and Security Auditor. 
            Review the following Git Diff for a Pull Request in the 'VISUALAIZE' repository (Next.js + FastAPI).
            
            PROJECT CONTEXT:
            - Frontend: Next.js 16, ReactFlow, Three.js.
            - Backend: FastAPI, Google Gemini 2.5 API.
            
            TASKS:
            1. Summarize the changes in 2-3 sentences.
            2. Check for logical flaws in ReactFlow or FastAPI implementations.
            3. Verify if security best practices are followed (API key handling, input validation).
            4. Identify any missing error handling or performance bottlenecks.
            
            GIT DIFF:
            ${diff}
            
            Format your response in Markdown with clear headings. Be constructive and specific.
            `;

            try {
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${process.env.GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: prompt }] }]
                })
              });
              
              const data = await response.json();
              const reviewText = data.candidates[0].content.parts[0].text;
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `🤖 **AI Code Review Summary**\n\n${reviewText}\n\n*Review generated by Gemini 2.0 Flash*`
              });
            } catch (error) {
              console.error("AI Review failed:", error);
            }
