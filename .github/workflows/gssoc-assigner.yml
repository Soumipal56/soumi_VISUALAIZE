name: GSSOC Auto-Assigner

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  auto-assign:
    if: ${{ !github.event.issue.pull_request && github.event.issue.state == 'open' }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Process Assignment
        uses: actions/github-script@v9
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const comment = context.payload.comment.body;
            const commenter = context.payload.comment.user.login;
            const issue = context.payload.issue;

            // --- STEP 1: AI INTENT DETECTION ---
            console.log(`Analyzing comment from @${commenter}: "${comment}"`);
            
            const aiPrompt = `You are a GitHub bot for the 'VISUALAIZE' project. 
            Analyze this comment: "${comment}". 
            Does the user express a clear intent to be assigned to work on this issue? 
            Respond with ONLY 'YES' or 'NO'.`;
            
            let intent = "NO";
            try {
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${process.env.GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: aiPrompt }] }] })
              });
              const data = await response.json();
              intent = data.candidates[0].content.parts[0].text.trim().toUpperCase();
              console.log(`AI Intent Detection Result: ${intent}`);
            } catch (e) {
              if (comment.toLowerCase().includes('assign')) intent = "YES";
            }

            if (!intent.includes('YES')) {
              console.log("No intent detected. Ignoring.");
              return;
            }

            // --- STEP 2: COLLISION PREVENTION ---
            if (issue.assignees && issue.assignees.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Hey @${commenter}! This issue is already assigned. Please check out other open issues! 🚀`
              });
              return;
            }

            // --- STEP 3: AUTO-LABELING (GSSOC 2026 Scoring) ---
            console.log(`Auto-labeling Issue #${issue.number} for GSSOC 2026 tracking...`);
            
            const labelsToAdd = ['gssoc', 'gssoc2026', 'assigned'];
            const issueLabels = issue.labels.map(l => l.name.toLowerCase());
            
            // Map difficulty to GSSOC levels
            if (issueLabels.includes('beginner') || issueLabels.includes('good first issue')) {
              labelsToAdd.push('level:beginner');
            } else if (issueLabels.includes('medium') || issueLabels.includes('intermediate')) {
              labelsToAdd.push('level:intermediate');
            } else if (issueLabels.includes('hard') || issueLabels.includes('advanced')) {
              labelsToAdd.push('level:advanced');
            } else if (issueLabels.includes('critical')) {
              labelsToAdd.push('level:critical');
            } else {
              // Default to beginner if no level is specified
              labelsToAdd.push('level:beginner');
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: labelsToAdd
            });

            // --- STEP 4: ASSIGNMENT ---
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              assignees: [commenter]
            });

            const levelLabel = labelsToAdd.find(l => l.startsWith('level:'));
            const points = {
              'level:beginner': '20 pts',
              'level:intermediate': '35 pts',
              'level:advanced': '55 pts',
              'level:critical': '80 pts'
            }[levelLabel] || '20 pts';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `🎉 Assigned to @${commenter}!\n\nWelcome to **VISUALAIZE**! 🚀\n\nI've automatically added the **GSSOC 2026** labels for tracking:\n- Label: \`${levelLabel}\` (Worth **${points}** upon merge!)\n\n📌 **Next Steps:**\n1. Read [CONTRIBUTING.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/master/CONTRIBUTING.md).\n2. **Important:** Your PR must have the \`gssoc:approved\` label to earn points.\n3. Ask questions in this thread if you get stuck.\n4. Link this issue in your PR!\n\nHappy coding! 💻✨`
            });
