version: "3.9"

# Production overrides — use pre-built images from the container registry.
# Run:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-priyanshu5ingh}/visualaize-backend:${IMAGE_TAG:-latest}
    build:
      cache_from:
        - ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-priyanshu5ingh}/visualaize-backend:cache
    restart: always
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  frontend:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-priyanshu5ingh}/visualaize-frontend:${IMAGE_TAG:-latest}
    build:
      cache_from:
        - ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-priyanshu5ingh}/visualaize-frontend:cache
    restart: always
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
